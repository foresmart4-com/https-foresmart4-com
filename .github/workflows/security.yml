name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

jobs:
  audit:
    name: Dependency & Secret Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      # 1. Dependency vulnerabilities — fail on high/critical
      - name: Bun audit (high+critical)
        run: |
          bun audit --audit-level=high --prod || {
            echo "::error::High or critical vulnerabilities detected in dependencies."
            exit 1
          }

      # 2. Secret scan — Gitleaks
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Gitleaks secret scan
        env:
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          if [ "$EVENT_NAME" = "push" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            LOG_OPTS="$BEFORE_SHA..$HEAD_SHA"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            LOG_OPTS="origin/$BASE_REF..HEAD"
          else
            LOG_OPTS="--all"
          fi
          "$(go env GOPATH)/bin/gitleaks" detect --source . --log-opts="$LOG_OPTS" --redact --verbose

      # 3. Static analysis — Semgrep with security ruleset
      - name: Semgrep (OWASP + security-audit)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/typescript
            p/react

      # 4. Custom check: no hard-coded service-role / secret keys in source
      - name: Forbid leaked secret patterns
        run: |
          if rg -n --hidden \
              -g '!**/node_modules/**' \
              -g '!**/dist/**' \
              -g '!**/.git/**' \
              -e 'SUPABASE_SERVICE_ROLE_KEY\s*=\s*"ey' \
              -e 'sk_live_[A-Za-z0-9]{20,}' \
              -e 'rk_live_[A-Za-z0-9]{20,}' \
              .; then
            echo "::error::Hard-coded production secrets detected."
            exit 1
          fi
